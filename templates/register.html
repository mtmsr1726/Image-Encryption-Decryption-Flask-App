<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="box">

<h1>Create Account</h1>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<br><br>

<input
type="email"
name="email"
placeholder="Gmail Address"
required>

<br><br>

<input
type="password"
name="password"
placeholder="Password"
required>

<br><br>

<input
type="password"
name="confirm_password"
placeholder="Confirm Password"
required>

<br><br>

<button type="submit">
Register
</button>

</form>

<br>

<a href="/login">
Already have an account?
</a>

</div>

</body>
</html>
