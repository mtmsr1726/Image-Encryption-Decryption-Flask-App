<!DOCTYPE html>
<html>
<head>
    <title>500 - Internal Server Error</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#111827;
            color:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            text-align:center;
        }

        h1{
            font-size:120px;
            color:#ef4444;
        }

        h2{
            margin-bottom:15px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:20px;
        }

        a{
            text-decoration:none;
            background:#ef4444;
            color:white;
            padding:12px 25px;
            border-radius:8px;
        }

        a:hover{
            background:#dc2626;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>500</h1>

    <h2>Internal Server Error</h2>

    <p>Something went wrong. Please try again later.</p>

    <a href="/dashboard">Go To Dashboard</a>

</div>

</body>
</html>
