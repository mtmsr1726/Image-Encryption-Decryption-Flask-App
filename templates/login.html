<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="box">

    <h1>Login</h1>

    {% if success %}
        <p class="success">{{ success }}</p>
    {% endif %}

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <input
        type="email"
        name="email"
        placeholder="Gmail Address"
        required>

        <br><br>

        <input
        type="password"
        name="password"
        placeholder="Password"
        required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <a href="/register">
        Create New Account
    </a>

</div>

</body>
</html>
